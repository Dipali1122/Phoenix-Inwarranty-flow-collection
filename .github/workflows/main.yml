name : Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * *  
    - cron: 00 14 * * 1-5

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2
        
      - name: Install nodejs
        uses: actions/setup-node@v6.3.0
        with:
          node-verison: '22'

      - name : Install Newman
        run : |
         npm install -g newman
         npm install -g newman-reporter-htmlextra
         
      - name : Run postman collection with newman
        run : |
          newman run 'Inwaranty flow collection withtestdata.postman_collection.json' \
          -e QA.postman_environment.json \
          -d testdata.csv \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./newman/index.html

      - name : Newman report
        if: always()
        uses: actions/upload-artifact@v5.0.0
        with:
           name : Newman report
           path : newman/*.html

      - name : creating github page branch
        if : always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name : Send Email Notification
        if : always()
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Inwaranty flow postman collection execution report
          to: deepalibk11@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Hi,
            Inwarranty flow postman collection is executed successfully from github actions and can be accessible from 
            link : https://dipali1122.github.io/Phoenix-Inwarranty-flow-collection/
          
        
      
         
      
  
