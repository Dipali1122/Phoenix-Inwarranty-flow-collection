name : Postman Collection Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: 30 02 * * *  
    - cron: 00 14 * * 1-5

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6.0.2
        
      - name: Install nodejs
        uses: actions/setup-node@v6.3.0
        with:
          node-verison: '22'

      - name : Install Newman
        run : |
         npm install -g newman
         npm install -g newman-reporter-htmlextra
         
      - name : Run postman collection with newman
        run : |
          newman run 'Inwaranty flow collection withtestdata.postman_collection.json' \
          -e QA.postman_environment.json \
          -d testdata.csv \
          -r cli,htmlextra

      - name : Newman report
        if: always()
        uses: actions/upload-artifact@v5.0.0
        with:
           name : Newman report
           path : newman/*.html
         
      
  
